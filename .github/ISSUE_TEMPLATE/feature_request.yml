name: Feature request
description: Propose a scoped tk improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should tk do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - CLI text output
        - CLI JSON output
        - MCP server
        - Spec0 workflow
        - Documentation
        - CI/development workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Suggested verification
      description: What test or command would prove this works?
