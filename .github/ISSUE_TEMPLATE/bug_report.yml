name: Bug report
description: Report a reproducible tk behavior problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
      placeholder: tk tree -L 2 --format json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: tk 0.1.0, commit SHA, or branch
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, fixtures, screenshots, or notes.
